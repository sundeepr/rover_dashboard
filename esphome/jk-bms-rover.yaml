substitutions:
  name: rover-jk-bms
  friendly_name: Rover JK-BMS
  tx_pin: GPIO17
  rx_pin: GPIO16

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source: github://syssi/esphome-jk-bms@main

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
  level: INFO

api:

ota:
  platform: esphome

mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_username
  password: !secret mqtt_password
  topic_prefix: jk-bms

uart:
  id: uart_0
  baud_rate: 115200
  rx_buffer_size: 384
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}

jk_bms:
  id: bms0
  uart_id: uart_0
  update_interval: 5s

binary_sensor:
  - platform: jk_bms
    balancing:
      name: "${friendly_name} balancing"
    charging:
      name: "${friendly_name} charging"
    discharging:
      name: "${friendly_name} discharging"

sensor:
  - platform: jk_bms
    jk_bms_id: bms0
    total_voltage:
      name: "${friendly_name} total voltage"
    current:
      name: "${friendly_name} current"
    power:
      name: "${friendly_name} power"
    capacity_remaining:
      name: "${friendly_name} capacity remaining"
    battery_strings:
      name: "${friendly_name} battery strings"
    errors_bitmask:
      name: "${friendly_name} errors bitmask"
    power_tube_temperature:
      name: "${friendly_name} power tube temperature"
    temperature_sensor_1:
      name: "${friendly_name} temperature sensor 1"
    temperature_sensor_2:
      name: "${friendly_name} temperature sensor 2"
    cell_voltage_1:
      name: "${friendly_name} cell voltage 1"
    cell_voltage_2:
      name: "${friendly_name} cell voltage 2"
    cell_voltage_3:
      name: "${friendly_name} cell voltage 3"
    cell_voltage_4:
      name: "${friendly_name} cell voltage 4"
    cell_voltage_5:
      name: "${friendly_name} cell voltage 5"
    cell_voltage_6:
      name: "${friendly_name} cell voltage 6"
    cell_voltage_7:
      name: "${friendly_name} cell voltage 7"
    cell_voltage_8:
      name: "${friendly_name} cell voltage 8"
    cell_voltage_9:
      name: "${friendly_name} cell voltage 9"
    cell_voltage_10:
      name: "${friendly_name} cell voltage 10"
    cell_voltage_11:
      name: "${friendly_name} cell voltage 11"
    cell_voltage_12:
      name: "${friendly_name} cell voltage 12"
    cell_voltage_13:
      name: "${friendly_name} cell voltage 13"
    cell_voltage_14:
      name: "${friendly_name} cell voltage 14"
    cell_voltage_15:
      name: "${friendly_name} cell voltage 15"
    cell_voltage_16:
      name: "${friendly_name} cell voltage 16"

text_sensor:
  - platform: jk_bms
    jk_bms_id: bms0
    errors:
      name: "${friendly_name} errors"
    operation_mode:
      name: "${friendly_name} operation mode"
    device_type:
      name: "${friendly_name} device type"
    software_version:
      name: "${friendly_name} software version"
